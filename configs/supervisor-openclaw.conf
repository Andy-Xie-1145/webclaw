[program:openclaw]
command=/opt/start-openclaw.sh
directory=/home/ubuntu
user=ubuntu
environment=HOME="/home/ubuntu"
priority=200
autostart=%(ENV_ENABLE_OPENCLAW)s
autorestart=true
startretries=5
startsecs=15
stdout_logfile=/tmp/openclaw_stdout.log
stderr_logfile=/tmp/openclaw_stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
